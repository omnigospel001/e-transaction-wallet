spring:
  application:
    name: etransactions

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:gospel_db
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 9090


jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5911}
  expiration-ms: ${JWT_EXPIRATION_MS:900000} # 15 minutes
  refresh-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000} # 7 days

app:
  email-topic: emails

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org:
      springframework:
        security: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health, info



